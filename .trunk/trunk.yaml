version: 0.1
cli:
  version: 1.22.8

plugins:
  sources:
    - id: trunk
      ref: v1.6.6
      uri: https://github.com/trunk-io/plugins

lint:
  enabled:
    - actionlint@1.7.7
    - checkov@3.2.346
    - git-diff-check
    - markdownlint@0.43.0
    - prettier@3.4.2
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - yamllint@1.35.1
  ignore:
    - linters: [ALL]
      paths:
        - .trunk/**

runtimes:
  enabled:
    - node@18.20.5
    - python@3.10.8
